<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amala Christie Eberhard — Human Design Business Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff8fc7; --pink-deep:#e95fa6; --teal:#5ad7d0; --teal-deep:#2bb3ab;
  --violet:#9b6dff; --magenta:#ff6fb0;
  --ink:#140f29; --ink-2:#1c1640; --panel:#211a47; --panel-2:#1a1438;
  --text:#fbf7ff; --text-soft:#e4dcf5; --muted:#b3a4d2;
  --gold:#ffd89b; --cream:#fdf7ef;
  --line:rgba(255,180,225,0.16);
  --line-2:rgba(120,200,220,0.18);
  --grad:linear-gradient(120deg,#ff8fc7 0%,#9b6dff 50%,#5ad7d0 100%);
  --grad-text:linear-gradient(110deg,#ffa6d4,#b98cff 55%,#6fe0d8);
  --biz-grad:linear-gradient(120deg,rgba(255,143,199,.16),rgba(155,109,255,.12));
  --biz-line:rgba(255,143,199,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--text);line-height:1.72;overflow-x:hidden}

/* cosmic bg */
.cosmos{position:fixed;inset:0;z-index:-3;background:
  radial-gradient(ellipse 70% 50% at 12% 8%,rgba(255,143,199,.26),transparent 60%),
  radial-gradient(ellipse 60% 50% at 88% 14%,rgba(90,215,208,.22),transparent 60%),
  radial-gradient(ellipse 80% 60% at 50% 100%,rgba(155,109,255,.26),transparent 65%),
  linear-gradient(180deg,#120c25 0%,#160f2e 45%,#0f0a20 100%);}
.stars{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,4s) ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.12;transform:scale(.7)}50%{opacity:.85;transform:scale(1.25)}}
.grid-overlay{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:54px 54px;}

/* ===== LAYOUT: sidebar + content ===== */
.shell{display:flex;min-height:100vh;max-width:1500px;margin:0 auto}
.sidebar{width:300px;flex:0 0 300px;position:sticky;top:0;height:100vh;overflow-y:auto;
  padding:30px 20px;border-right:1px solid var(--line);background:rgba(16,11,33,.6);backdrop-filter:blur(14px);scrollbar-width:thin}
.sidebar::-webkit-scrollbar{width:6px}.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:opacity .2s}
.brand:hover{opacity:.82}
.brand .logo{width:42px;height:42px;border-radius:13px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 8px 24px -8px rgba(255,143,199,.6)}
.brand .bt{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--text)}
.brand .bt span{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:italic}
.side-name{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:400;margin:18px 0 4px;line-height:1.1}
.side-sub{font-size:.78rem;color:var(--muted);margin-bottom:20px}
.side-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.side-stats .chip{font-size:.64rem;letter-spacing:.04em;padding:5px 9px;border-radius:999px;background:rgba(255,143,199,.1);border:1px solid var(--line);color:var(--text-soft)}
.navlist{list-style:none;display:flex;flex-direction:column;gap:3px}
.navlist button{width:100%;text-align:left;background:transparent;border:none;color:var(--text-soft);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;
  padding:11px 14px;border-radius:12px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:11px}
.navlist button .nx{font-size:.66rem;color:var(--muted);font-variant-numeric:tabular-nums;min-width:18px}
.navlist button:hover{background:rgba(255,143,199,.08);color:#fff}
.navlist button.active{background:var(--grad);color:#1a1330;font-weight:600;box-shadow:0 8px 22px -10px rgba(255,143,199,.7)}
.navlist button.active .nx{color:rgba(26,19,48,.7)}
.side-cta{margin-top:24px;display:block;text-align:center;font-weight:600;font-size:.85rem;color:#1a1330;background:var(--grad);padding:12px;border-radius:12px;text-decoration:none;transition:transform .25s}
.side-cta:hover{transform:translateY(-2px)}

.content{flex:1;min-width:0;padding:0 0 80px}

/* ===== SLIM STICKY IDENTITY BAR ===== */
.idbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 56px;border-bottom:1px solid var(--line);
  background:rgba(18,12,37,.82);backdrop-filter:blur(16px)}
.idbar .who{font-family:'Fraunces',serif;font-size:1.05rem;color:#fff;font-weight:400}
.idbar .who b{font-style:italic;font-weight:500;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.idbar .pills{display:flex;flex-wrap:wrap;gap:7px;margin-left:auto}
.idbar .pill{font-size:.66rem;letter-spacing:.06em;padding:5px 11px;border-radius:999px;background:rgba(255,143,199,.1);border:1px solid var(--line);color:var(--text-soft);white-space:nowrap}

/* mobile top tabs (hidden on desktop) */
.mobilebar{display:none}

/* ===== PANELS ===== */
.panels{padding:0}
.panel{display:none;padding:46px 56px 30px;animation:fade .55s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.eyebrow2{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:14px}
.panel h2.title{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(2rem,4.4vw,3.3rem);line-height:1.04;letter-spacing:-.01em;margin-bottom:8px}
.panel h2.title em{font-style:italic;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.panel .intro{font-size:1.12rem;line-height:1.75;color:var(--text);opacity:.92;max-width:760px;margin:14px 0 8px}

/* banner pull-quote */
.banner{margin:30px 0;padding:22px 26px;border-left:3px solid;border-image:var(--grad) 1;
  background:linear-gradient(120deg,rgba(255,143,199,.1),rgba(90,215,208,.06));border-radius:0 16px 16px 0}
.banner p{font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;line-height:1.4;color:#fff;margin:0}

h3.sec{font-family:'Fraunces',serif;font-weight:400;font-size:1.7rem;margin:40px 0 8px;color:#fff}
h4.sub{font-size:.74rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin:30px 0 12px}
p.body{color:var(--text-soft);margin-bottom:16px;font-size:1.08rem;line-height:1.8;max-width:760px}
p.body b{color:#fff;font-weight:600}
em.i{font-style:italic;color:#fff}

/* two-column card row */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:24px 0}
.bigcard{background:rgba(33,26,71,.5);border:1px solid var(--line);border-radius:20px;padding:30px;backdrop-filter:blur(8px)}
.bigcard h3{font-family:'Fraunces',serif;font-weight:400;font-size:1.5rem;color:#fff;margin-bottom:14px}
.bigcard p{color:var(--text-soft);font-size:1rem;margin-bottom:13px}

/* BUSINESS callout box */
.bizbox{margin:26px 0;padding:26px 30px;border-radius:18px;border:1px solid var(--biz-line);
  background:radial-gradient(ellipse at top left,rgba(255,143,199,.14),rgba(155,109,255,.05) 60%),rgba(33,20,55,.55)}
.bizbox .tag{font-size:.92rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.bizbox p{color:var(--text-soft);font-size:1.06rem;line-height:1.75;margin-bottom:12px}
.bizbox p:last-child{margin-bottom:0}
.bizbox p b{color:#fff}

/* IN PRACTICE list */
.practice{margin:24px 0;padding:26px 30px;border-radius:18px;border:1px solid var(--line);background:rgba(28,22,64,.4)}
.practice .tag{font-size:.92rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.practice ul{list-style:none}
.practice li{position:relative;padding:16px 0 16px 30px;border-bottom:1px solid rgba(255,255,255,.06);color:var(--text-soft);font-size:1.05rem;line-height:1.7}
.practice li:last-child{border-bottom:none}
.practice li::before{content:"→";position:absolute;left:0;top:16px;color:var(--pink);font-weight:700}
.practice li b{color:#fff;font-weight:600;display:block;margin-bottom:4px;font-size:1.08rem}
.practice li b+br{display:none}
.practice.stop li::before{content:"⛔";font-size:.95rem}
.practice.start li::before{content:"✨";font-size:.95rem}

/* spark bullets */
ul.spark{list-style:none;margin:6px 0 18px;max-width:820px}
ul.spark li{position:relative;padding-left:28px;margin-bottom:12px;color:var(--text-soft);font-size:1.05rem;line-height:1.7}
ul.spark li::before{content:"✦";position:absolute;left:0;top:1px;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:.85rem}
ul.spark li b{color:#fff;font-weight:600}
ol.steps{list-style:none;counter-reset:s;margin:6px 0 18px;max-width:820px}
ol.steps li{position:relative;padding-left:44px;margin-bottom:13px;color:var(--text-soft);font-size:1.02rem}
ol.steps li b{color:#fff}
ol.steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:-1px;width:28px;height:28px;border-radius:50%;background:rgba(255,143,199,.12);border:1px solid var(--line);color:var(--pink);font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center}

/* sub-tabs */
.subtabs{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 26px;padding:7px;border-radius:16px;background:rgba(28,22,64,.5);border:1px solid var(--line);width:fit-content;max-width:100%}
.subtab{font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;color:var(--text-soft);background:transparent;border:none;padding:9px 18px;border-radius:11px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:7px}
.subtab:hover{color:#fff}
.subtab.active{background:var(--grad);color:#1a1330;font-weight:600}
.subpanel{display:none;animation:fade .4s ease}
.subpanel.active{display:block}

/* expandable */
.exp{border:1px solid var(--line);border-radius:16px;margin:12px 0;overflow:hidden;background:rgba(33,26,71,.4)}
.exp summary{cursor:pointer;padding:18px 22px;font-weight:600;color:#fff;list-style:none;display:flex;align-items:center;gap:14px;transition:background .25s;font-size:1.05rem}
.exp summary::-webkit-details-marker{display:none}
.exp summary:hover{background:rgba(255,143,199,.07)}
.exp summary .pl{margin-left:auto;flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:rgba(255,143,199,.12);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--pink);font-size:1.2rem;transition:transform .3s}
.exp[open] summary .pl{transform:rotate(45deg)}
.exp summary .meta{font-size:.72rem;color:var(--muted);font-weight:400;margin-left:8px}
.exp .inner{padding:2px 22px 22px;color:var(--text-soft)}
.exp .inner h5{color:var(--teal);font-size:.92rem;letter-spacing:.12em;text-transform:uppercase;margin:18px 0 8px}
.exp .inner p{margin-bottom:12px;font-size:1.04rem;line-height:1.75}
.exp .inner p b{color:#fff}
.exp .inner ul{list-style:none;margin:6px 0 10px}
.exp .inner ul li{position:relative;padding-left:22px;margin-bottom:9px;font-size:1rem}
.exp .inner ul li::before{content:"✦";position:absolute;left:0;color:var(--pink);font-size:.8rem}

/* mantra / quote boxes */
.mantra{text-align:center;background:var(--biz-grad);border:1px solid var(--biz-line);border-radius:18px;padding:26px;margin:24px 0}
.mantra .tag{font-size:.88rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
.mantra .txt{font-family:'Fraunces',serif;font-style:italic;font-size:1.2rem;color:#fff}
.feel{background:linear-gradient(120deg,rgba(155,109,255,.14),rgba(90,215,208,.1));border:1px solid var(--line);border-radius:16px;padding:22px 26px;margin:18px 0;font-family:'Fraunces',serif;font-style:italic;font-size:1.1rem;line-height:1.5;color:#f0e8ff}

/* chips / tags */
.chips{display:flex;flex-wrap:wrap;gap:9px;margin:14px 0 6px}
.chips .c{font-size:.85rem;padding:7px 15px;border-radius:999px;background:rgba(255,143,199,.08);border:1px solid var(--biz-line);color:var(--text-soft)}

/* cardgrid */
.cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:15px;margin:22px 0}
.minicard{background:rgba(33,26,71,.5);border:1px solid var(--line);border-radius:16px;padding:22px;transition:transform .3s,border-color .3s}
.minicard:hover{transform:translateY(-5px);border-color:var(--pink)}
.minicard .ix{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:700}
.minicard .nm{font-family:'Fraunces',serif;font-size:1.3rem;color:#fff;margin:6px 0 6px}
.minicard .ds{font-size:.92rem;color:var(--text-soft)}

/* before/after + swap */
.ba,.swap{display:grid;grid-template-columns:1fr 1fr;border-radius:16px;overflow:hidden;border:1px solid var(--line);margin:22px 0;max-width:900px}
.ba .h,.swap .h{padding:13px 18px;font-weight:700;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase}
.ba .h.b{background:rgba(155,109,255,.16);color:var(--violet)}
.ba .h.a{background:linear-gradient(120deg,rgba(255,143,199,.2),rgba(90,215,208,.16));color:var(--pink)}
.swap .h.i{background:rgba(155,109,255,.16);color:var(--violet)}
.swap .h.s{background:linear-gradient(120deg,rgba(255,216,155,.18),rgba(255,143,199,.16));color:var(--gold)}
.ba .c,.swap .c{padding:13px 18px;font-size:.95rem;color:var(--text-soft);border-top:1px solid var(--line)}
.ba .c.left,.swap .c.left{border-right:1px solid var(--line)}
.swap .c.say{font-style:italic;color:#f2ebff}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:10px;margin:22px 0;max-width:880px}
.fstep{background:rgba(33,26,71,.5);border:1px solid var(--line);border-left:3px solid;border-image:var(--grad) 1;border-radius:0 14px 14px 0;padding:16px 20px}
.fstep .l{font-weight:700;color:#fff;font-size:.98rem;margin-bottom:3px}
.fstep .d{font-style:italic;color:var(--text-soft);font-size:.92rem}

/* revenue */
.rev{background:rgba(33,26,71,.5);border:1px solid var(--biz-line);border-radius:16px;padding:22px 26px;margin:16px 0;max-width:760px}
.rev .rt{font-family:'Fraunces',serif;font-size:1.2rem;color:#fff;margin-bottom:12px}
.rev .line{color:var(--text-soft);margin-bottom:7px;font-size:.98rem;display:flex;justify-content:space-between;gap:16px;border-bottom:1px dashed rgba(255,255,255,.08);padding-bottom:7px}
.rev .line span:last-child{color:#fff;white-space:nowrap}
.rev .total{color:#fff;font-weight:700;margin-top:10px;font-size:1.1rem;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* formula */
.formula{margin:18px 0;max-width:880px}
.formula .step{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,.06)}
.formula .step:last-child{border-bottom:none}
.formula .lab{display:inline-block;font-weight:700;letter-spacing:.1em;color:var(--violet);font-size:.78rem;margin-bottom:6px}
.formula .ex{font-style:italic;color:var(--gold)}

/* prompt */
.prompt{background:rgba(28,22,64,.5);border:1px solid var(--line);border-radius:16px;padding:22px;margin:16px 0;max-width:880px}
.prompt .pt{display:flex;align-items:center;gap:8px;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:12px}
.prompt .ptext{font-style:italic;color:#f0e8ff;background:rgba(155,109,255,.08);border-radius:12px;padding:16px 18px;margin-bottom:14px;font-size:1rem;line-height:1.55}
.prompt button{font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;color:#1a1330;background:var(--grad);border:none;padding:9px 20px;border-radius:999px;cursor:pointer;transition:transform .25s}
.prompt button:hover{transform:translateY(-2px)}
.prompt button.copied{background:var(--teal)}

/* whole chart numbered */
.bignum{display:flex;gap:22px;margin:28px 0;align-items:flex-start}
.bignum .n{font-family:'Fraunces',serif;font-size:2.4rem;line-height:1;color:transparent;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;flex:0 0 auto;opacity:.8}
.bignum .bd h3{font-family:'Fraunces',serif;font-weight:400;font-size:1.4rem;color:#fff;margin-bottom:8px}
.bignum .bd p{color:var(--text-soft);font-size:1rem}

/* CTA + footer */
.cta{text-align:center;margin:50px 0 10px;padding:50px 30px;background:var(--biz-grad);border:1px solid var(--biz-line);border-radius:24px}
.cta h3{font-family:'Fraunces',serif;font-weight:300;font-size:2.3rem;margin-bottom:12px}
.cta p{color:var(--text-soft);max-width:560px;margin:0 auto 26px}
.cta a{display:inline-block;font-weight:600;color:#1a1330;background:var(--grad);padding:15px 36px;border-radius:999px;text-decoration:none;transition:transform .3s}
.cta a:hover{transform:translateY(-3px)}
footer{text-align:center;padding:36px 24px 10px;color:var(--muted);font-size:.84rem}
footer .sig{font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}

/* bodygraph block */
.bg-wrap{display:flex;flex-wrap:wrap;gap:30px;align-items:center;margin:26px 0;
  background:rgba(28,22,64,.4);border:1px solid var(--line);border-radius:20px;padding:26px 30px}
.bg-svg{flex:0 0 auto}
.bg-legend{font-size:.92rem;color:var(--text-soft);max-width:340px;flex:1 1 240px}
.bg-legend h4{font-family:'Fraunces',serif;font-weight:400;font-size:1.25rem;color:#fff;margin-bottom:12px}
.bg-legend .row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.bg-legend .sw{width:16px;height:16px;border-radius:5px;flex:0 0 auto;margin-top:3px}
.bg-legend .sw.def{background:var(--grad)}
.bg-legend .sw.undef{background:transparent;border:1.5px solid var(--pink)}
.bg-legend .row b{color:#fff;font-weight:600}
.bg-legend .note{margin-top:6px;font-size:.8rem;color:var(--muted)}

/* ===== RESPONSIVE ===== */
@media(max-width:980px){
  .shell{flex-direction:column}
  .sidebar{display:none}
  .mobilebar{display:block;position:sticky;top:0;z-index:60;background:rgba(16,11,33,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .mobilebar .mbrand{display:flex;align-items:center;gap:10px;padding:12px 18px 6px}
  .mobilebar .mbrand .logo{width:32px;height:32px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1rem}
  .mobilebar .mbrand .t{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#fff}
  .mobilebar .mwho{font-family:'Fraunces',serif;font-size:1rem;line-height:1.4;color:#fff;padding:2px 18px 10px}
  .mobilebar .mwho b{font-style:italic;font-weight:500;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .mtabs{display:flex;gap:6px;overflow-x:auto;padding:0 14px 12px;scrollbar-width:none}
  .mtabs::-webkit-scrollbar{display:none}
  .mtab{flex:0 0 auto;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;color:var(--text-soft);background:rgba(255,143,199,.06);border:1px solid var(--line);padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .25s}
  .mtab.active{background:var(--grad);color:#1a1330;font-weight:600;border-color:transparent}
  /* hide the in-content identity bar on mobile (shown in mobilebar instead) */
  .idbar{display:none}
  .panel{padding:30px 22px 20px}
  .duo{grid-template-columns:1fr}
  .ba,.swap{grid-template-columns:1fr}
  .ba .c.left,.swap .c.left{border-right:none}
  .bg-wrap{padding:20px}
  /* page sub-tabs become a dropdown on mobile */
  .subtabs{display:none}
  .subnav-select{display:block}
}
@media(max-width:560px){
  .panel h2.title{font-size:1.9rem}

/* ===== BODYGRAPH GENERATOR ===== */
function bodygraph(highlight,w,h){
  const defined=["head","ajna","will","g","spleen"];
  const hi=new Set(highlight||[]);
  w=w||220;h=h||348;
  const cx=120;
  const C={
    head:{type:"tri-up",x:cx,y:26,w:50,h:32},
    ajna:{type:"tri-dn",x:cx,y:72,w:50,h:32},
    throat:{type:"rect",x:cx,y:126,w:46,h:38},
    g:{type:"diam",x:cx,y:196,w:54,h:54},
    will:{type:"tri-rt",x:172,y:188,w:30,h:34},
    sacral:{type:"rect",x:cx,y:266,w:46,h:38},
    spleen:{type:"tri-lf",x:50,y:262,w:34,h:46},
    solar:{type:"tri-rt2",x:190,y:262,w:34,h:46},
    root:{type:"rect",x:cx,y:330,w:50,h:38}
  };
  const A={head:[cx,42],ajna:[cx,56],throat:[cx,107],g:[cx,170],will:[157,188],
    sacral:[cx,247],spleen:[67,262],solar:[173,262],root:[cx,311]};
  function shape(c,k){
    const isDef=defined.includes(k),isHi=hi.has(k);
    let fill,stroke,sw;
    if(isDef){fill=isHi?"url(#bgHot)":"url(#bgGrad)";stroke="none";sw=0;}
    else{fill="rgba(255,255,255,0.02)";stroke=isHi?"#ff8fc7":"rgba(255,180,225,0.42)";sw=isHi?3:2;}
    const op=isHi?1:(isDef?0.9:1);
    const x=c.x,y=c.y,ww=c.w,hh=c.h;let el="";
    if(c.type==="tri-up")el=`<polygon points="${x},${y-hh/2} ${x+ww/2},${y+hh/2} ${x-ww/2},${y+hh/2}"`;
    else if(c.type==="tri-dn")el=`<polygon points="${x},${y+hh/2} ${x+ww/2},${y-hh/2} ${x-ww/2},${y-hh/2}"`;
    else if(c.type==="diam")el=`<polygon points="${x},${y-hh/2} ${x+ww/2},${y} ${x},${y+hh/2} ${x-ww/2},${y}"`;
    else if(c.type==="tri-rt"||c.type==="tri-rt2")el=`<polygon points="${x-ww/2},${y-hh/2} ${x+ww/2},${y} ${x-ww/2},${y+hh/2}"`;
    else if(c.type==="tri-lf")el=`<polygon points="${x+ww/2},${y-hh/2} ${x-ww/2},${y} ${x+ww/2},${y+hh/2}"`;
    else el=`<rect x="${x-ww/2}" y="${y-hh/2}" width="${ww}" height="${hh}" rx="5"`;
    return `${el} fill="${fill}" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/>`;
  }
  const lines=[["head","ajna"],["ajna","throat"],["throat","g"],["throat","will"],["throat","solar"],
    ["g","sacral"],["g","spleen"],["will","g"],["sacral","root"],["sacral","spleen"],["sacral","solar"],["spleen","root"],["solar","root"]];
  let chan="";lines.forEach(p=>{const a=A[p[0]],b=A[p[1]];chan+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>`;});
  let shapes="";Object.keys(C).forEach(k=>shapes+=shape(C[k],k));
  return `<svg width="${w}" height="${h}" viewBox="0 0 240 380" xmlns="http://www.w3.org/2000/svg" aria-label="Body​graph">
   <defs>
     <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8fc7"/><stop offset="0.5" stop-color="#9b6dff"/><stop offset="1" stop-color="#5ad7d0"/></linearGradient>
     <linearGradient id="bgHot" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd89b"/><stop offset="0.5" stop-color="#ff8fc7"/><stop offset="1" stop-color="#ff6fb0"/></linearGradient>
   </defs>${chan}${shapes}</svg>`;
}
function bgBlock(highlight,legendHtml){
  return `<div class="bg-wrap"><div class="bg-svg">${bodygraph(highlight)}</div><div class="bg-legend">${legendHtml}</div></div>`;
}

<h2 class="title">What Is Human Design <em>(And Why It Changes How You Do Business)</em></h2>
<p class="intro">Amala — this is your complete energetic business map. How you're wired, what you're built for, and how to actually use all of it to build a business that brings the right people to you. Everything after this is built specifically for you, from your chart, your intake, and the work you already do.</p>

<p class="body">Okay, quick story before we dive in. Human Design is basically a map of how you're wired. It's worked out from your birthday, your birth time, and where you were born, and it mashes together a few old systems with a bit of physics. Sounds a little out there, I know. But here's the thing: it's not a personality quiz, it's not your horoscope, and it's definitely not a list of who you should try to be. It's a map of who you already are.</p>

/* sub-tab switching — shared by desktop buttons and mobile dropdown */
function showSub(sub){
  // find the panel that contains this subpanel
  const target=document.getElementById('sub-'+sub);
  if(!target)return;
  const panel=target.closest('.panel');
  // toggle panels
  panel.querySelectorAll('.subpanel').forEach(sp=>sp.classList.toggle('active',sp.id==='sub-'+sub));
  // sync desktop buttons
  panel.querySelectorAll('.subtab').forEach(x=>x.classList.toggle('active',x.dataset.sub===sub));
  // sync mobile dropdown
  panel.querySelectorAll('.subnav-select select').forEach(sel=>{
    if([...sel.options].some(o=>o.value===sub)) sel.value=sub;
  });
}
function selectSub(sub){ showSub(sub); }

  const done=()=>{btn.textContent='Copied ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy Instruction ✦';btn.classList.remove('copied');},2000);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));}
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(ta);
}
